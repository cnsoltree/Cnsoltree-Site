<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#f9fafb"/>
  <text x="600" y="80" text-anchor="middle" font-size="30" font-weight="700" fill="#111827">How Condensed Aerosol Suppression Works</text>
  <text x="600" y="115" text-anchor="middle" font-size="16" fill="#6b7280">From trigger to flame extinction in under 3 seconds</text>

  <g transform="translate(60, 220)">
    <rect width="240" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
    <circle cx="120" cy="70" r="34" fill="#dcfce7"/>
    <text x="120" y="82" text-anchor="middle" font-size="34" font-weight="800" fill="#15803d">1</text>
    <text x="120" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Trigger</text>
    <text x="120" y="190" text-anchor="middle" font-size="13" fill="#4b5563">Thermal bulb breaks at</text>
    <text x="120" y="210" text-anchor="middle" font-size="13" fill="#4b5563">rated temp, or 24 V</text>
    <text x="120" y="230" text-anchor="middle" font-size="13" fill="#4b5563">signal from fire panel</text>
  </g>

  <g transform="translate(330, 220)">
    <rect width="240" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
    <circle cx="120" cy="70" r="34" fill="#dcfce7"/>
    <text x="120" y="82" text-anchor="middle" font-size="34" font-weight="800" fill="#15803d">2</text>
    <text x="120" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Combustion</text>
    <text x="120" y="190" text-anchor="middle" font-size="13" fill="#4b5563">Solid aerosol-forming</text>
    <text x="120" y="210" text-anchor="middle" font-size="13" fill="#4b5563">compound burns in a</text>
    <text x="120" y="230" text-anchor="middle" font-size="13" fill="#4b5563">controlled reaction</text>
  </g>

  <g transform="translate(600, 220)">
    <rect width="240" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
    <circle cx="120" cy="70" r="34" fill="#dcfce7"/>
    <text x="120" y="82" text-anchor="middle" font-size="34" font-weight="800" fill="#15803d">3</text>
    <text x="120" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Dispersion</text>
    <text x="120" y="190" text-anchor="middle" font-size="13" fill="#4b5563">Potassium-rich</text>
    <text x="120" y="210" text-anchor="middle" font-size="13" fill="#4b5563">microparticles flood the</text>
    <text x="120" y="230" text-anchor="middle" font-size="13" fill="#4b5563">protected volume</text>
  </g>

  <g transform="translate(870, 220)">
    <rect width="240" height="280" rx="14" fill="#15803d"/>
    <circle cx="120" cy="70" r="34" fill="#ffffff"/>
    <text x="120" y="82" text-anchor="middle" font-size="34" font-weight="800" fill="#15803d">4</text>
    <text x="120" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Extinction</text>
    <text x="120" y="190" text-anchor="middle" font-size="13" fill="#dcfce7">Free radicals captured;</text>
    <text x="120" y="210" text-anchor="middle" font-size="13" fill="#dcfce7">flame chain reaction</text>
    <text x="120" y="230" text-anchor="middle" font-size="13" fill="#dcfce7">stops in 1-3 seconds</text>
  </g>

  <g stroke="#15803d" stroke-width="2" fill="none">
    <path d="M 305 360 L 325 360" marker-end="url(#arrow)"/>
    <path d="M 575 360 L 595 360" marker-end="url(#arrow)"/>
    <path d="M 845 360 L 865 360" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
  </defs>

  <text x="600" y="600" text-anchor="middle" font-size="14" fill="#9ca3af">Soltree | Din Rail Aerosol Fire Extinguisher</text>
