<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1400" height="500" fill="#f9fafb"/>
  <text x="700" y="60" text-anchor="middle" font-size="28" font-weight="700" fill="#111827">From PO to Destination</text>
  <text x="700" y="92" text-anchor="middle" font-size="15" fill="#6b7280">Realistic timeline for a CE EN 15276 standard SKU shipping to the EU</text>

  <line x1="100" y1="240" x2="1300" y2="240" stroke="#15803d" stroke-width="3"/>

  <g transform="translate(100, 240)">
    <circle r="14" fill="#15803d"/>
    <circle r="6" fill="#ffffff"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">PO Placed</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 0</text>
  </g>

  <g transform="translate(270, 240)">
    <circle r="12" fill="#ffffff" stroke="#15803d" stroke-width="3"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Raw Material</text>
    <text y="-32" text-anchor="middle" font-size="12" fill="#6b7280">Procurement</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 3-7</text>
  </g>

  <g transform="translate(440, 240)">
    <circle r="12" fill="#ffffff" stroke="#15803d" stroke-width="3"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Assembly</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 8-25</text>
  </g>

  <g transform="translate(610, 240)">
    <circle r="12" fill="#ffffff" stroke="#15803d" stroke-width="3"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">QC + Test</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 26-30</text>
  </g>

  <g transform="translate(780, 240)">
    <circle r="14" fill="#15803d"/>
    <circle r="6" fill="#ffffff"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">DG Packing</text>
    <text y="-32" text-anchor="middle" font-size="12" fill="#6b7280">UN 3268</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 31-33</text>
  </g>

  <g transform="translate(950, 240)">
    <circle r="12" fill="#ffffff" stroke="#15803d" stroke-width="3"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Origin Customs</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 34-35</text>
  </g>

  <g transform="translate(1120, 240)">
    <circle r="12" fill="#ffffff" stroke="#15803d" stroke-width="3"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Ocean Freight</text>
    <text y="-32" text-anchor="middle" font-size="12" fill="#6b7280">Class 9 IMDG</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 36-60</text>
  </g>

  <g transform="translate(1290, 240)">
    <circle r="14" fill="#15803d"/>
    <circle r="6" fill="#ffffff"/>
    <text y="-50" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Arrival</text>
    <text y="50" text-anchor="middle" font-size="12" fill="#6b7280">Day 60-65</text>
  </g>

  <g transform="translate(100, 380)">
    <rect width="1200" height="80" rx="12" fill="#dcfce7"/>
    <text x="40" y="35" font-size="14" font-weight="700" fill="#15803d">Total: ~60-65 days from PO to EU port</text>
    <text x="40" y="60" font-size="13" fill="#15803d">35 days production + 28 days transit (Shenzhen to Valencia, illustrative)</text>
  </g>
</svg>
