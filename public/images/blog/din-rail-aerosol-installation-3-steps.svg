<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="500" fill="#f9fafb"/>
  <text x="600" y="60" text-anchor="middle" font-size="28" font-weight="700" fill="#111827">Installation in Three Steps</text>
  <text x="600" y="92" text-anchor="middle" font-size="15" fill="#6b7280">3-15 minutes per unit, depending on activation mode</text>

  <g transform="translate(60, 150)">
    <rect width="340" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
    <circle cx="50" cy="50" r="22" fill="#15803d"/>
    <text x="50" y="60" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">1</text>
    <text x="170" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Mount on DIN Rail</text>
    <line x1="20" y1="100" x2="320" y2="100" stroke="#e5e7eb"/>
    <text x="20" y="135" font-size="13" fill="#4b5563">Clip onto standard 35 mm</text>
    <text x="20" y="158" font-size="13" fill="#4b5563">DIN rail in any vacant position.</text>
    <text x="20" y="195" font-size="13" fill="#4b5563">Position in the top third of the</text>
    <text x="20" y="218" font-size="13" fill="#4b5563">cabinet, away from cooling fans,</text>
    <text x="20" y="241" font-size="13" fill="#4b5563">with at least 10 mm clearance.</text>
  </g>

  <g transform="translate(430, 150)">
    <rect width="340" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
    <circle cx="50" cy="50" r="22" fill="#15803d"/>
    <text x="50" y="60" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">2</text>
    <text x="170" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Wire the Trigger</text>
    <line x1="20" y1="100" x2="320" y2="100" stroke="#e5e7eb"/>
    <text x="20" y="135" font-size="13" fill="#4b5563">Electric or dual-mode units only.</text>
    <text x="20" y="172" font-size="13" fill="#4b5563">Connect a 2-wire 24 VDC firing</text>
    <text x="20" y="195" font-size="13" fill="#4b5563">line to the fire panel signal output.</text>
    <text x="20" y="232" font-size="13" fill="#4b5563">Connect status contact to panel</text>
    <text x="20" y="255" font-size="13" fill="#4b5563">supervision (NO/NC).</text>
  </g>

  <g transform="translate(800, 150)">
    <rect width="340" height="280" rx="14" fill="#15803d"/>
    <circle cx="50" cy="50" r="22" fill="#ffffff"/>
    <text x="50" y="60" text-anchor="middle" font-size="22" font-weight="800" fill="#15803d">3</text>
    <text x="170" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Verify Status</text>
    <line x1="20" y1="100" x2="320" y2="100" stroke="#16a34a"/>
    <text x="20" y="135" font-size="13" fill="#dcfce7">Apply control voltage to the</text>
    <text x="20" y="158" font-size="13" fill="#dcfce7">monitoring circuit.</text>
    <text x="20" y="195" font-size="13" fill="#dcfce7">Status LED should illuminate</text>
    <text x="20" y="218" font-size="13" fill="#dcfce7">green within 5 seconds, confirming</text>
    <text x="20" y="241" font-size="13" fill="#dcfce7">initiator continuity.</text>
  </g>

  <text x="600" y="475" text-anchor="middle" font-size="14" fill="#9ca3af">Soltree | Always follow project-specific commissioning procedures</text>
</svg>
